groups:
  - name: monitoring-services
    rules:
      - alert: AlertmanagerUnavailable
        expr: up{job="prometheus"} == 1 unless alertmanager_cluster_members
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Alertmanager unavailable"
          description: "Prometheus cannot observe a healthy Alertmanager cluster."

      - alert: PrometheusTsdbCompactionsFailing
        expr: increase(prometheus_tsdb_compactions_failed_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB compaction failure"
          description: "Prometheus TSDB compactions have failed recently."
