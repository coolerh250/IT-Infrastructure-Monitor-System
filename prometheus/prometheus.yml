global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: production
    stack: it-infrastructure-monitor

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/node_targets.yml
        refresh_interval: 1m

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/http_targets.yml
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115


  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module:
        - icmp
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/icmp_targets.yml
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module:
        - tcp_connect
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/tcp_targets.yml
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
