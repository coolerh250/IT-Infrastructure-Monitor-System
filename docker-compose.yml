services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grafana}
      POSTGRES_USER: ${POSTGRES_USER:-grafana}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      TZ: ${TZ:-UTC}
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.2.2}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: ${POSTGRES_DB:-grafana}
      GF_DATABASE_USER: ${POSTGRES_USER:-grafana}
      GF_DATABASE_PASSWORD__FILE: /run/secrets/postgres_password
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: ${TZ:-UTC}
    secrets:
      - grafana_admin_password
      - postgres_password
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.54.1}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
    networks:
      - monitoring

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.27.0}
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
      - --storage.path=/alertmanager
    environment:
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-admin@example.com}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-monitoring@example.com}
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-smtp.example.com:587}
      SMTP_USERNAME: ${SMTP_USERNAME:-monitoring@example.com}
      SMTP_PASSWORD_FILE: /run/secrets/smtp_password
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      TZ: ${TZ:-UTC}
    secrets:
      - smtp_password
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - alertmanager-data:/alertmanager
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring

  blackbox-exporter:
    image: ${BLACKBOX_IMAGE:-prom/blackbox-exporter:v0.25.0}
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.8.2}
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  grafana-data:
  postgres-data:
  prometheus-data:
  alertmanager-data:

secrets:
  grafana_admin_password:
    file: ${GRAFANA_ADMIN_PASSWORD_FILE:?set GRAFANA_ADMIN_PASSWORD_FILE in .env}
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?set POSTGRES_PASSWORD_FILE in .env}
  smtp_password:
    file: ${SMTP_PASSWORD_FILE:?set SMTP_PASSWORD_FILE in .env}
